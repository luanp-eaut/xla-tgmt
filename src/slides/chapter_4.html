<h1 id="%E1%BB%A9ng-d%E1%BB%A5ng-th%E1%BB%B1c-ti%E1%BB%85n">Ứng dụng thực tiễn</h1>
<ul>
<li><strong>Y tế:</strong> Phân vùng khối u, tế bào, mạch máu trong ảnh MRI, CT, X-quang.</li>
<li><strong>Xe tự hành:</strong> Phân vùng làn đường, vỉa hè, người đi bộ, biển báo.</li>
<li><strong>Thị giác máy tính:</strong> Tiền xử lý cho Nhận diện đối tượng, Phân đoạn ngữ nghĩa.</li>
<li><strong>Công nghiệp:</strong> Phát hiện lỗi trên dây chuyền sản xuất vi mạch, dệt may.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="c%C3%A1c-h%C6%B0%E1%BB%9Bng-ti%E1%BA%BFp-c%E1%BA%ADn-ch%C3%ADnh">Các hướng tiếp cận chính</h1>
<ul>
<li><strong>Dựa trên Biên:</strong> Phát hiện nơi có sự thay đổi đột ngột về cường độ sáng.</li>
<li><strong>Dựa trên Ngưỡng:</strong> Dựa vào cường độ sáng để tách nền và đối tượng.</li>
<li><strong>Dựa trên Vùng:</strong> Nhóm các pixel lân cận có đặc điểm tương đồng.</li>
<li><strong>Deep Learning:</strong> Sử dụng các mô hình CNN/Transformer (U-Net, Mask R-CNN, SAM).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="8" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A1t-hi%E1%BB%87n-%C4%91i%E1%BB%83m-%C4%91%C6%B0%E1%BB%9Dng-v%C3%A0-bi%C3%AAn">PHÁT HIỆN ĐIỂM, ĐƯỜNG VÀ BIÊN</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="kh%C3%A1i-ni%E1%BB%87m-1">Khái niệm</h1>
<ul>
<li><strong>Điểm (Point):</strong> Một pixel có cường độ khác biệt rõ rệt so với các pixel lân cận.</li>
<li><strong>Đường (Line):</strong> Một dãy điểm có xu hướng thẳng hàng theo một hướng nhất định.</li>
<li><strong>Biên (Edge):</strong> Vị trí có sự thay đổi đột ngột về cường độ ảnh.</li>
</ul>
<p><strong>Ý nghĩa của từng loại</strong></p>
<ul>
<li><strong>Point:</strong> Thường xuất hiện như một &quot;đốm&quot; sáng/tối nổi bật trên nền xung quanh.</li>
<li><strong>Line:</strong> Cho thấy cấu trúc kéo dài theo một hướng, như mép vật thể hoặc vệt sáng.</li>
<li><strong>Edge:</strong> Dấu hiệu quan trọng nhất vì nó biểu thị ranh giới giữa hai vùng ảnh khác nhau.<br />
Các đối tượng này thường được phát hiện bằng những toán tử phát hiện thay đổi cục bộ trên lân cận pixel.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A1t-hi%E1%BB%87n-%C4%91i%E1%BB%83m-bi%E1%BB%87t-l%E1%BA%ADp">PHÁT HIỆN ĐIỂM BIỆT LẬP</h1>
<p><strong>Mục tiêu</strong></p>
<ul>
<li>Phát hiện pixel khác thường so với nền xung quanh.</li>
</ul>
<p><strong>Phương pháp</strong></p>
<ul>
<li>Dùng mặt nạ Laplacian để đo độ thay đổi cục bộ quanh mỗi pixel.</li>
<li><strong>Mặt nạ Laplacian:</strong> Hệ số trung tâm dương lớn (8), các lân cận mang giá trị âm (-1).</li>
<li>Khi pixel trung tâm khác hẳn xung quanh, đáp ứng R sẽ lớn.</li>
</ul>
<p><strong>Điều kiện phát hiện</strong></p>
<ul>
<li>Điểm biệt lập được phát hiện khi: R &gt; T, trong đó T là ngưỡng phát hiện.</li>
<li>Đây là một phép phát hiện dựa trên biến đổi cục bộ nên rất nhạy với chi tiết nhỏ.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A1t-hi%E1%BB%87n-%C4%91%C6%B0%E1%BB%9Dng">PHÁT HIỆN ĐƯỜNG</h1>
<p><strong>Mục tiêu</strong></p>
<ul>
<li>Tìm các đường có hướng xác định như ngang, dọc, chéo trong ảnh.</li>
</ul>
<p><strong>Phương pháp</strong></p>
<ul>
<li>Dùng các mặt nạ đạo hàm riêng tương ứng cho từng hướng để làm nổi bật vùng có cường độ thay đổi theo hướng đó.</li>
<li>Mỗi mặt nạ được thiết kế để phản ứng mạnh với một hướng đường nhất định.</li>
<li>Sau khi tích chập ảnh với mặt nạ, đường được phát hiện khi đáp ứng vượt ngưỡng T.</li>
</ul>
<p><strong>Ví dụ</strong></p>

<h1 id="ph%C3%A1t-hi%E1%BB%87n-bi%C3%AAn">PHÁT HIỆN BIÊN</h1>
<p><strong>Khái niệm</strong></p>
<ul>
<li>Biên là nơi cường độ ảnh thay đổi đột ngột giữa hai vùng lân cận.</li>
</ul>
<p><strong>Hai phương pháp toán học cơ bản</strong></p>
<ol>
<li><strong>Dựa trên Gradient (Đạo hàm bậc nhất):</strong>
<ul>
<li>Biên xuất hiện tại nơi độ lớn gradient đạt cực đại cục bộ.</li>
<li>Gradient cho biết mức thay đổi cường độ theo hướng lớn nhất.</li>
</ul>
</li>
<li><strong>Dựa trên Laplacian (Đạo hàm bậc hai):</strong>
<ul>
<li>Biên thường được xác định tại nơi đi qua không (zero-crossing).</li>
<li>Khi dấu của đáp ứng đổi từ dương sang âm hoặc ngược lại, đó là vị trí biên.</li>
<li>Cách này cho biên mỏng hơn nhưng nhạy hơn với nhiễu.</li>
</ul>
</li>
</ol>
</section>

<p><strong>Cách chọn ngưỡng T</strong></p>

</ul>

<h1 id="th%E1%BB%B1c-h%C3%A0nh-ph%C3%A1t-hi%E1%BB%87n-bi%C3%AAn-v%E1%BB%9Bi-to%C3%A1n-t%E1%BB%AD-sobel-v%C3%A0-ph%C3%A2n-ng%C6%B0%E1%BB%A1ng">Thực hành: Phát hiện biên với toán tử Sobel và phân ngưỡng</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

img = cv2.imread(<span class="hljs-string">&#x27;sample.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># Tính toán Sobel</span>
sobelx = cv2.Sobel(img, cv2.CV_64F, <span class="hljs-number">1</span>, <span class="hljs-number">0</span>, ksize=<span class="hljs-number">5</span>)
sobely = cv2.Sobel(img, cv2.CV_64F, <span class="hljs-number">0</span>, <span class="hljs-number">1</span>, ksize=<span class="hljs-number">5</span>)

<span class="hljs-comment"># Tính biên độ gradient</span>
magnitude = np.sqrt(sobelx**<span class="hljs-number">2</span> + sobely**<span class="hljs-number">2</span>)
magnitude = np.uint8(magnitude / np.<span class="hljs-built_in">max</span>(magnitude) * <span class="hljs-number">255</span>)

<span class="hljs-comment"># Phân ngưỡng để lấy biên mạnh</span>
_, edges = cv2.threshold(magnitude, <span class="hljs-number">50</span>, <span class="hljs-number">255</span>, cv2.THRESH_BINARY)

plt.subplot(<span class="hljs-number">121</span>), plt.imshow(magnitude, cmap=<span class="hljs-string">&#x27;gray&#x27;</span>), plt.title(<span class="hljs-string">&#x27;Magnitude&#x27;</span>)
plt.subplot(<span class="hljs-number">122</span>), plt.imshow(edges, cmap=<span class="hljs-string">&#x27;gray&#x27;</span>), plt.title(<span class="hljs-string">&#x27;Thresholded Edges&#x27;</span>)
plt.show()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="k%E1%BB%B9-thu%E1%BA%ADt-ph%C3%A1t-hi%E1%BB%87n-bi%C3%AAn-n%C3%A2ng-cao">KỸ THUẬT PHÁT HIỆN BIÊN NÂNG CAO</h1>
<p><strong>Khắc phục nhạy cảm với nhiễu</strong></p>
<ul>
<li>Làm mịn ảnh trước khi lấy đạo hàm (ví dụ: dùng bộ lọc Gauss).</li>
</ul>
<p><strong>Bộ phát hiện biên Marr-Hildreth (LoG)</strong></p>
<ol>
<li>Làm mịn ảnh bằng bộ lọc Gauss.</li>
<li>Tính Laplacian của ảnh đã làm mịn.</li>
<li>Tìm các điểm đi qua không (zero-crossing) của kết quả.</li>
</ol>
<p><strong>Bộ phát hiện biên Canny</strong></p>
<ol>
<li><strong>Làm mịn:</strong> Dùng bộ lọc Gauss để giảm nhiễu.</li>
<li><strong>Tính Gradient:</strong> Tính biên độ và hướng gradient.</li>
<li><strong>Nén không cực đại (Non-maximum Suppression):</strong> Chỉ giữ lại các pixel là cực đại địa phương theo hướng gradient.</li>
<li><strong>Ngưỡng kép (Double Thresholding):</strong> Phân loại pixel thành biên mạnh, biên yếu và không phải biên.</li>
<li><strong>Nối biên theo dõi độ trễ (Hysteresis):</strong> Nối các biên yếu với biên mạnh nếu chúng liên kết với nhau.</li>
</ol>
<p><strong>Bài tập thực hành: Phát hiện biên Canny</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

img = cv2.imread(<span class="hljs-string">&#x27;sample.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># Áp dụng Canny Edge Detection</span>
edges = cv2.Canny(img, threshold1=<span class="hljs-number">100</span>, threshold2=<span class="hljs-number">200</span>)

plt.subplot(<span class="hljs-number">121</span>), plt.imshow(img, cmap=<span class="hljs-string">&#x27;gray&#x27;</span>), plt.title(<span class="hljs-string">&#x27;Original&#x27;</span>)
plt.subplot(<span class="hljs-number">122</span>), plt.imshow(edges, cmap=<span class="hljs-string">&#x27;gray&#x27;</span>), plt.title(<span class="hljs-string">&#x27;Canny Edges&#x27;</span>)
plt.show()
</code></pre>
</section>

<h1 id="n%E1%BB%91i-c%C3%A1c-%C4%91i%E1%BB%83m-bi%C3%AAn">NỐI CÁC ĐIỂM BIÊN</h1>
<p><strong>Mục tiêu</strong></p>
<ul>
<li>Kết quả phát hiện biên thường bị đứt đoạn. Cần nối các đoạn rời thành đường biên hoàn chỉnh dựa trên tính liên tục về vị trí và hướng.</li>
</ul>
<p><strong>Xử lý cục bộ</strong></p>
<ul>
<li>Dựa trên lân cận của từng điểm biên.</li>
<li>Nếu các điểm gần nhau và có đặc trưng gradient/hướng tương tự, chúng được xem là thuộc cùng một đường biên.</li>
<li>Phù hợp khi biên chỉ bị đứt nhẹ hoặc có nhiễu nhỏ.</li>
</ul>
<p><strong>Xử lý toàn cục (Hough Transform)</strong></p>
<ul>
<li>Dùng để tìm các cấu trúc hình học lớn như đường thẳng trong toàn ảnh.</li>
<li>Chuyển các điểm biên sang không gian tham số [ρ, θ], tìm các đỉnh tích lũy lớn để suy ra đường thẳng.</li>
<li>Rất hữu ích khi biên bị đứt đoạn nhưng vẫn cùng thuộc một đường thẳng.</li>
</ul>
<p><strong>Vai trò của gradient và hướng</strong></p>
<ul>
<li>Các điểm có gradient và hướng gần giống nhau thường được ưu tiên liên kết với nhau, giúp đường biên sau khi nối mượt và hợp lý hơn.</li>
</ul>
</section>

<h1 id="ph%C3%A2n-ng%C6%B0%E1%BB%A1ng">PHÂN NGƯỠNG</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="kh%C3%A1i-ni%E1%BB%87m-2">Khái niệm</h1>
<ul>
<li>Phân ngưỡng là kỹ thuật chuyển ảnh đa cấp xám thành ảnh nhị phân.</li>
<li>Mỗi pixel được so sánh với ngưỡng T để quyết định thuộc đối tượng (1) hay nền (0).</li>
</ul>
<p><strong>Nền tảng</strong></p>
<ul>
<li>Giả sử ảnh có vật thể sáng trên nền tối.</li>
<li>Histogram thường có hai đỉnh: một đỉnh cho nền tối, một đỉnh cho vật thể sáng.</li>
<li>Ta chọn ngưỡng T nằm giữa hai đỉnh để tách hai lớp ảnh.</li>
</ul>
<p><strong>Các yếu tố ảnh hưởng</strong></p>
<ul>
<li><strong>Nhiễu:</strong> Làm xuất hiện các giá trị cường độ không mong muốn, làm mất tính hai đỉnh của histogram. Giải pháp: làm mịn ảnh trước khi phân ngưỡng.</li>
<li><strong>Chiếu sáng và phản xạ:</strong> Chiếu sáng không đều làm biến dạng histogram. Giải pháp: hiệu chỉnh chiếu sáng hoặc dùng phân ngưỡng thích nghi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">

<p><strong>Phân ngưỡng cục bộ (Thích nghi)</strong></p>
<ul>
<li>Ngưỡng <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.593ex" height="1.532ex" role="img" focusable="false" viewBox="0 -677 704 677"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D447" d="M40 437Q21 437 21 445Q21 450 37 501T71 602L88 651Q93 669 101 677H569H659Q691 677 697 676T704 667Q704 661 687 553T668 444Q668 437 649 437Q640 437 637 437T631 442L629 445Q629 451 635 490T641 551Q641 586 628 604T573 629Q568 630 515 631Q469 631 457 630T439 622Q438 621 368 343T298 60Q298 48 386 46Q418 46 427 45T436 36Q436 31 433 22Q429 4 424 1L422 0Q419 0 415 0Q410 0 363 1T228 2Q99 2 64 0H49Q43 6 43 9T45 27Q49 40 55 46H83H94Q174 46 189 55Q190 56 191 56Q196 59 201 76T241 233Q258 301 269 344Q339 619 339 625Q339 630 310 630H279Q212 630 191 624Q146 614 121 583T67 467Q60 445 57 441T43 437H40Z"></path></g></g></g></svg></mjx-container> phụ thuộc vào vùng hoặc lân cận quanh điểm ảnh.</li>
<li>Phù hợp với ảnh có nền sáng tối thay đổi, vì mỗi vùng sẽ có ngưỡng riêng.</li>
<li>Thường được gọi là phân ngưỡng biến đổi hoặc phân ngưỡng thích nghi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="th%E1%BB%B1c-h%C3%A0nh-so-s%C3%A1nh-ph%C3%A2n-ng%C6%B0%E1%BB%A1ng-to%C3%A0n-c%E1%BB%A5c-v%C3%A0-c%E1%BB%A5c-b%E1%BB%99">Thực hành: So sánh phân ngưỡng toàn cục và cục bộ</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2

img = cv2.imread(<span class="hljs-string">&#x27;sample.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># Phân ngưỡng toàn cục (Otsu)</span>
ret, thresh_global = cv2.threshold(img, <span class="hljs-number">0</span>, <span class="hljs-number">255</span>, cv2.THRESH_BINARY + cv2.THRESH_OTSU)

<span class="hljs-comment"># Phân ngưỡng cục bộ (Adaptive Thresholding)</span>
thresh_adaptive = cv2.adaptiveThreshold(img, <span class="hljs-number">255</span>, cv2.ADAPTIVE_THRESH_GAUSSIAN_C,
                                        cv2.THRESH_BINARY, <span class="hljs-number">11</span>, <span class="hljs-number">2</span>)

cv2.imshow(<span class="hljs-string">&#x27;Global&#x27;</span>, thresh_global)
cv2.imshow(<span class="hljs-string">&#x27;Adaptive&#x27;</span>, thresh_adaptive)
cv2.waitKey(<span class="hljs-number">0</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A2n-ng%C6%B0%E1%BB%A1ng-to%C3%A0n-c%E1%BB%A5c-t%E1%BB%91i-%C6%B0u-%E2%80%93-otsu">PHÂN NGƯỠNG TOÀN CỤC TỐI ƯU – OTSU</h1>
<p><strong>Nguyên lý hoạt động</strong></p>
<ul>
<li>Otsu là phương pháp tự động tìm ngưỡng T tối ưu bằng cách tối đa hóa phương sai giữa các lớp (between-class variance).</li>
<li>Ảnh được chia thành 2 lớp theo ngưỡng T: lớp nền và lớp đối tượng.</li>
<li>Nếu hai lớp tách biệt tốt thì phương sai giữa các lớp sẽ lớn.</li>
</ul>

<p><strong>Đặc điểm</strong></p>
<ul>
<li>Ngưỡng không còn là một số duy nhất mà là một vector ngưỡng.</li>
<li>Có thể xem là mở rộng của Otsu cho bài toán nhiều lớp (Multi-class Otsu).</li>
<li>Mục tiêu: tìm các ngưỡng sao cho các vùng sau khi tách ra khác nhau rõ nhất về mặt thống kê.</li>
</ul>
<p><strong>Nhược điểm</strong></p>
<ul>
<li>Khi số ngưỡng tăng, số tổ hợp cần thử tăng rất nhanh (độ phức tạp tính toán cao).</li>
<li>Thường tốn tài nguyên hơn đáng kể so với phân ngưỡng toàn cục đơn.</li>
</ul>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="t%E1%BB%95ng-quan">Tổng quan</h1>
<ul>
<li>Các phương pháp dựa trên vùng (Region-based) tập trung vào tính đồng nhất của các vùng ảnh thay vì sự thay đổi đột ngột tại biên.</li>
<li>Hai hướng tiếp cận chính:
<ol>
<li><strong>Phát triển vùng (Region Growing):</strong> Bắt đầu từ các điểm hạt giống và mở rộng ra các vùng lân cận.</li>
<li><strong>Chia tách và hợp nhất (Split &amp; Merge):</strong> Chia ảnh thành các vùng nhỏ, sau đó hợp nhất các vùng lân cận có tính chất tương đồng.</li>
</ol>

<h1 id="ph%C3%A2n-%C4%91o%E1%BA%A1n-b%E1%BA%B1ng-ph%C3%A1t-tri%E1%BB%83n-v%C3%B9ng-region-growing">PHÂN ĐOẠN BẰNG PHÁT TRIỂN VÙNG (REGION GROWING)</h1>
<p><strong>Ý tưởng</strong></p>
<ul>
<li>Bắt đầu từ một tập hợp các điểm hạt giống (seed points).</li>
<li>Phát triển thành vùng bằng cách thêm vào các pixel lân cận có tính chất giống với hạt (cường độ sáng, màu sắc, kết cấu).</li>
<li>Hữu ích khi đối tượng cần tách có sự đồng nhất cục bộ.</li>
</ul>

<h1 id="b%C3%A0i-t%E1%BA%ADp-th%E1%BB%B1c-h%C3%A0nh-thu%E1%BA%ADt-to%C3%A1n-region-growing-%C4%91%C6%A1n-gi%E1%BA%A3n">Bài tập thực hành: Thuật toán Region Growing đơn giản</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">import</span> cv2

<span class="hljs-keyword">def</span> <span class="hljs-title function_">region_growing</span>(<span class="hljs-params">img, seed, threshold=<span class="hljs-number">10</span></span>):
    height, width = img.shape
    segmented = np.zeros_like(img)
    seed_value = img[seed[<span class="hljs-number">1</span>], seed[<span class="hljs-number">0</span>]]

    queue = [seed]
    segmented[seed[<span class="hljs-number">1</span>], seed[<span class="hljs-number">0</span>]] = <span class="hljs-number">255</span>

    <span class="hljs-keyword">while</span> queue:
        current = queue.pop(<span class="hljs-number">0</span>)
        x, y = current

        <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(-<span class="hljs-number">1</span>, <span class="hljs-number">2</span>):
            <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(-<span class="hljs-number">1</span>, <span class="hljs-number">2</span>):
                nx, ny = x + i, y + j
                <span class="hljs-keyword">if</span> <span class="hljs-number">0</span> &lt;= nx &lt; width <span class="hljs-keyword">and</span> <span class="hljs-number">0</span> &lt;= ny &lt; height:
                    <span class="hljs-keyword">if</span> segmented[ny, nx] == <span class="hljs-number">0</span>:
                        <span class="hljs-keyword">if</span> <span class="hljs-built_in">abs</span>(<span class="hljs-built_in">int</span>(img[ny, nx]) - <span class="hljs-built_in">int</span>(seed_value)) &lt;= threshold:
                            segmented[ny, nx] = <span class="hljs-number">255</span>
                            queue.append((nx, ny))

    <span class="hljs-keyword">return</span> segmented

img = cv2.imread(<span class="hljs-string">&#x27;sample.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)
result = region_growing(img, seed=(<span class="hljs-number">100</span>, <span class="hljs-number">100</span>), threshold=<span class="hljs-number">15</span>)
cv2.imshow(<span class="hljs-string">&#x27;Region Growing&#x27;</span>, result)
cv2.waitKey(<span class="hljs-number">0</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="chia-t%C3%A1ch-v%C3%A0-h%E1%BB%A3p-nh%E1%BA%A5t-v%C3%B9ng-split--merge">CHIA TÁCH VÀ HỢP NHẤT VÙNG (SPLIT &amp; MERGE)</h1>
<p><strong>Ý tưởng</strong></p>
<ul>
<li>Dựa trên tính đồng nhất của vùng. Chia ảnh thành các vùng nhỏ nếu vùng còn không đồng nhất, rồi hợp các vùng lân cận có tính chất giống nhau.</li>
</ul>
<p><strong>Chia vùng (Split)</strong></p>
<ul>
<li>Biểu diễn bằng cây tứ phân (quadtree).</li>
<li>Bắt đầu từ toàn bộ ảnh. Kiểm tra độ đồng nhất (dựa trên phương sai, mức xám).</li>
<li>Nếu không đồng nhất, chia thành 4 phần con và lặp lại đệ quy.</li>
</ul>
<p><strong>Hợp nhất vùng (Merge)</strong></p>
<ul>
<li>Sau khi chia, các vùng lân cận có đặc trưng tương tự được hợp nhất để tránh phân đoạn quá mức.</li>
<li>Giúp giảm số vùng nhỏ rời rạc và tạo kết quả ổn định hơn.</li>
</ul>
<p><strong>Điều kiện dừng</strong></p>
<ul>
<li>Khi một vùng đã đủ đồng nhất.</li>
<li>Khi không thể chia nhỏ thêm hoặc không còn vùng lân cận nào đủ giống để hợp nhất.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="30" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A2n-%C4%91o%E1%BA%A1n-s%E1%BB%AD-d%E1%BB%A5ng-ph%C3%A2n-c%E1%BB%A5m-v%C3%A0-superpixels">PHÂN ĐOẠN SỬ DỤNG PHÂN CỤM VÀ SUPERPIXELS</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="t%E1%BB%95ng-quan-1">Tổng quan</h1>
<ul>
<li>Sử dụng các thuật toán học máy không giám sát (như K-Means) hoặc các kỹ thuật gom nhóm pixel thông minh (Superpixels) để phân vùng ảnh.</li>
<li>Giúp giảm độ phức tạp tính toán và tận dụng được thông tin không gian, màu sắc.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A2n-%C4%91o%E1%BA%A1n-v%C3%B9ng-b%E1%BA%B1ng-ph%C3%A2n-c%E1%BB%A5m-k-means">PHÂN ĐOẠN VÙNG BẰNG PHÂN CỤM K-MEANS</h1>
<p><strong>Nguyên lý</strong></p>
<ul>
<li>Mỗi pixel được xem như một điểm trong không gian đặc trưng (cường độ, màu sắc, tọa độ không gian).</li>
<li>K-Means gom các pixel giống nhau vào cùng một vùng dựa trên khoảng cách đến tâm cụm.</li>
</ul>
<p><strong>Thuật toán</strong></p>
<ol>
<li>Chọn ngẫu nhiên K tâm cụm ban đầu.</li>
<li>Gán mỗi pixel vào tâm gần nhất (thường theo khoảng cách Euclid).</li>
<li>Cập nhật tâm cụm bằng trung bình các pixel trong cụm.</li>
<li>Lặp lại cho đến khi hội tụ.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="b%C3%A0i-t%E1%BA%ADp-th%E1%BB%B1c-h%C3%A0nh-ph%C3%A2n-%C4%91o%E1%BA%A1n-%E1%BA%A3nh-b%E1%BA%B1ng-k-means">Bài tập thực hành: Phân đoạn ảnh bằng K-Means</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

img = cv2.imread(<span class="hljs-string">&#x27;sample.jpg&#x27;</span>)
img = cv2.cvtColor(img, cv2.COLOR_BGR2RGB)

pixel_values = img.reshape((-<span class="hljs-number">1</span>, <span class="hljs-number">3</span>))
pixel_values = np.float32(pixel_values)

criteria = (cv2.TERM_CRITERIA_EPS + cv2.TERM_CRITERIA_MAX_ITER, <span class="hljs-number">100</span>, <span class="hljs-number">0.2</span>)
K = <span class="hljs-number">3</span>
_, labels, centers = cv2.kmeans(pixel_values, K, <span class="hljs-literal">None</span>, criteria, <span class="hljs-number">10</span>, cv2.KMEANS_RANDOM_CENTERS)

labels = labels.reshape((img.shape[<span class="hljs-number">0</span>], img.shape[<span class="hljs-number">1</span>]))
segmented_img = np.uint8(centers)[labels]

cv2.imshow(<span class="hljs-string">&#x27;K-Means Segmentation&#x27;</span>, segmented_img)
cv2.waitKey(<span class="hljs-number">0</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="36">
<h1 id="ph%C3%A2n-%C4%91o%E1%BA%A1n-b%E1%BA%B1ng-superpixels">PHÂN ĐOẠN BẰNG SUPERPIXELS</h1>
<p><strong>Khái niệm</strong></p>
<ul>
<li>Superpixel là cách gom các pixel lân cận có đặc trưng giống nhau (màu sắc, độ sáng, vị trí) thành một vùng lớn hơn.</li>
<li>Các vùng này bám biên tốt hơn so với việc xét từng pixel riêng lẻ hoặc chia theo ô chữ nhật cố định.</li>
</ul>
<p><strong>Lợi ích</strong></p>
<ul>
<li>Giảm số lượng phần tử cần xử lý (từ hàng trăm nghìn pixel xuống còn vài trăm superpixels).</li>
<li>Giữ được thông tin biên quan trọng, giúp thuật toán phía sau chạy nhanh hơn.</li>
</ul>
<p><strong>Ứng dụng</strong></p>
<ul>
<li>Tiền xử lý cho phân đoạn ảnh, tách nền, theo dõi video và nhận dạng đối tượng.</li>
</ul>
</section>

<h1 id="b%C3%A0i-t%E1%BA%ADp-th%E1%BB%B1c-h%C3%A0nh-t%E1%BA%A1o-superpixels-v%E1%BB%9Bi-slic">Bài tập thực hành: Tạo Superpixels với SLIC</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> skimage.segmentation <span class="hljs-keyword">import</span> slic
<span class="hljs-keyword">from</span> skimage <span class="hljs-keyword">import</span> io
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

img = io.imread(<span class="hljs-string">&#x27;sample.jpg&#x27;</span>)

<span class="hljs-comment"># Áp dụng SLIC</span>
segments = slic(img, n_segments=<span class="hljs-number">100</span>, compactness=<span class="hljs-number">10</span>, sigma=<span class="hljs-number">1</span>)

plt.axis(<span class="hljs-string">&#x27;off&#x27;</span>)
plt.show()
</code></pre>
