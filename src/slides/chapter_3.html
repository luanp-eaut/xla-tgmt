<h1 id="gi%E1%BB%9Bi-thi%E1%BB%87u">GIỚI THIỆU</h1>
<ul>
<li>
<p><strong>Khái niệm:</strong> Nén ảnh là quá trình giảm dung lượng (số bit) cần thiết để biểu diễn một bức ảnh, sao cho ảnh sau khi nén vẫn đảm bảo chất lượng chấp nhận được theo mục đích sử dụng.</p>
</li>
<li>

<h1 id="c%C3%A1c-lo%E1%BA%A1i-d%C6%B0-th%E1%BB%ABa-d%E1%BB%AF-li%E1%BB%87u-trong-%E1%BA%A3nh-s%E1%BB%91">Các loại dư thừa dữ liệu trong ảnh số</h1>
<ul>
<li><strong>Dư thừa mã hóa (Coding Redundancy):</strong> Sử dụng nhiều bit hơn mức cần thiết để biểu diễn các mức xám do phân bố xác suất không đều.</li>
<li><strong>Dư thừa không gian (Spatial Redundancy):</strong> Các pixel lân cận có giá trị rất giống nhau hoặc phụ thuộc lẫn nhau mạnh. Thường được khai thác bởi RLE, DCT, hoặc các bộ lọc không gian/tần số.</li>
<li><strong>Thông tin không liên quan (Irrelevant Information):</strong> Thông tin bị hệ thống thị giác con người (HVS) bỏ qua hoặc không cần thiết cho ứng dụng cụ thể. Thường bị loại bỏ trong nén mất mát (lossy).</li>
</ul>
</section>

<h1 id="th%E1%BB%B1c-h%C3%A0nh-t%C3%ADnh-entropy-c%E1%BB%A7a-%E1%BA%A3nh">Thực hành Tính Entropy của ảnh.</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> math

<span class="hljs-keyword">def</span> <span class="hljs-title function_">calculate_entropy</span>(<span class="hljs-params">probabilities</span>):
    entropy = <span class="hljs-number">0</span>
    <span class="hljs-keyword">for</span> p <span class="hljs-keyword">in</span> probabilities:
        <span class="hljs-keyword">if</span> p &gt; <span class="hljs-number">0</span>:
            entropy -= p * math.log2(p)
    <span class="hljs-keyword">return</span> entropy

<span class="hljs-comment"># Ví dụ: Ảnh có 3 mức xám với xác suất xuất hiện lần lượt là 0.5, 0.3, 0.2</span>
probs = [<span class="hljs-number">0.5</span>, <span class="hljs-number">0.3</span>, <span class="hljs-number">0.2</span>]
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Entropy của ảnh: <span class="hljs-subst">{calculate_entropy(probs):<span class="hljs-number">.4</span>f}</span> bits/pixel&quot;</span>)
</code></pre>

<li><strong>SNR (Signal-to-Noise Ratio):</strong> Tỷ lệ tín hiệu trên nhiễu. SNR càng cao, chất lượng ảnh càng tốt.</li>

<h1 id="th%E1%BB%B1c-h%C3%A0nh-t%C3%ADnh-rmse-v%C3%A0-snr">Thực hành Tính RMSE và SNR.</h1>
<p><gap></gap></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

<span class="hljs-keyword">def</span> <span class="hljs-title function_">calculate_rmse</span>(<span class="hljs-params">original, compressed</span>):
    <span class="hljs-keyword">return</span> np.sqrt(np.mean((original - compressed) ** <span class="hljs-number">2</span>))

<span class="hljs-keyword">def</span> <span class="hljs-title function_">calculate_snr</span>(<span class="hljs-params">original, compressed</span>):
    signal_power = np.mean(original ** <span class="hljs-number">2</span>)
    noise_power = np.mean((original - compressed) ** <span class="hljs-number">2</span>)
    <span class="hljs-keyword">return</span> <span class="hljs-number">10</span> * np.log10(signal_power / noise_power)

<span class="hljs-comment"># Ví dụ</span>
original = np.array([[<span class="hljs-number">100</span>, <span class="hljs-number">150</span>], [<span class="hljs-number">200</span>, <span class="hljs-number">250</span>]])
compressed = np.array([[<span class="hljs-number">105</span>, <span class="hljs-number">145</span>], [<span class="hljs-number">195</span>, <span class="hljs-number">255</span>]])
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;RMSE: <span class="hljs-subst">{calculate_rmse(original, compressed):<span class="hljs-number">.4</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;SNR: <span class="hljs-subst">{calculate_snr(original, compressed):<span class="hljs-number">.2</span>f}</span> dB&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="c%C3%A1c-lo%E1%BA%A1i-n%C3%A9n-%E1%BA%A3nh">Các loại nén ảnh</h1>
<ul>
<li><strong>Nén không tổn hao (Lossless):</strong>
<ul>
<li><em>Nguyên lý:</em> Tìm và loại bỏ sự dư thừa mà không làm mất thông tin.</li>
<li><em>Đặc điểm:</em> Ảnh khôi phục giống hệt ảnh gốc. Tỷ lệ nén thấp (thường 2:1 đến 4:1).</li>
<li><em>Ứng dụng:</em> Ảnh y tế, văn bản, ảnh đồ họa (logo).</li>
</ul>
</li>
<li><strong>Nén có tổn hao (Lossy):</strong>
<ul>
<li><em>Nguyên lý:</em> Loại bỏ những thông tin mà mắt người khó nhận ra.</li>
<li><em>Đặc điểm:</em> Ảnh khôi phục gần giống, mất một số chi tiết nhỏ. Tỷ lệ nén cao (10:1, 20:1 hoặc hơn).</li>
<li><em>Ứng dụng:</em> Ảnh chụp, video, web (JPEG).</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%B4-h%C3%ACnh-h%E1%BB%87-th%E1%BB%91ng-n%C3%A9n-%E1%BA%A3nh-t%E1%BB%95ng-qu%C3%A1t">Mô hình hệ thống nén ảnh tổng quát</h1>
<ul>
<li>Hệ thống nén ảnh thường được chia thành hai khối chính: bộ mã hóa và bộ giải mã. Bộ mã hóa biến ảnh gốc thành dạng dữ liệu ngắn gọn hơn để lưu trữ hoặc truyền đi, còn bộ giải mã khôi phục lại ảnh từ dữ liệu đã nén.</li>
<li><strong>Bộ mã hóa (Encoder):</strong>
<ul>
<li><strong>Mapper:</strong> Giảm dư thừa không gian/thời gian (biến đổi ảnh sang dạng thuận lợi hơn).</li>
<li><strong>Quantizer:</strong> Giảm thông tin không liên quan (chỉ có trong nén lossy). Làm tròn/gộp giá trị để giảm số mức biểu diễn.</li>
<li><strong>Symbol Coder:</strong> Giảm dư thừa mã hóa (sử dụng mã độ dài biến đổi, mã loạt dài...).</li>
</ul>
</li>
<li><strong>Bộ giải mã (Decoder):</strong> Thực hiện quá trình ngược lại.
<ul>
<li><strong>Symbol Decoder:</strong> Giải mã ký hiệu.</li>
<li><strong>Inverse Quantizer:</strong> Giải lượng tử hóa (chỉ có trong lossy).</li>
<li><strong>Inverse Mapper:</strong> Biến đổi ngược để khôi phục ảnh.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="13" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="n%C3%A9n-kh%C3%B4ng-t%E1%BB%95n-th%E1%BA%A5t-lossless">NÉN KHÔNG TỔN THẤT (LOSSLESS)</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="%C4%91%E1%BB%8Bnh-ngh%C4%A9a">Định nghĩa</h1>
<ul>
<li>Các thuật toán và kỹ thuật nén ảnh bảo toàn toàn vẹn dữ liệu gốc.</li>
<li>Đảm bảo ảnh giải nén giống hệt 100% so với ảnh trước khi nén.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-huffman">Mã Huffman</h1>
<div class="columns">
<div class="col-2">
<ul>
<li><strong>Khái niệm:</strong> Phương pháp mã hóa độ dài thay đổi. Ký tự xuất hiện càng nhiều thì mã càng ngắn, ký tự hiếm mã càng dài. Giúp giảm số bit trung bình cần dùng.</li>
<li><strong>Quy trình xây dựng cây Huffman:</strong>
<ol>
<li>Sắp xếp các ký tự theo xác suất (tần suất).</li>
<li>Gộp 2 xác suất nhỏ nhất thành một nút mới có giá trị bằng tổng 2 nút con.</li>
<li>Lặp lại cho đến khi còn lại 1 cây duy nhất.</li>
<li>Gán bit cho các nhánh (ví dụ: trái = 0, phải = 1).</li>
</ol>
</li>
<li><strong>Ứng dụng:</strong> Mã hóa các pixel theo giá trị mức xám (0-255).</li>
</ul>
</div>
<div>
<p><img src="images/3.2.png" alt="" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="v%C3%AD-d%E1%BB%A5-m%C3%A3-huffman-1">Ví dụ mã Huffman (1)</h1>
<ul>
<li><strong>Chuỗi cần mã hoá:</strong> &quot;Cộng hoà xã hội chủ nghĩa&quot;</li>
<li><strong>Trước mã hoá:</strong> Chuỗi ký tự ASCII tiêu chuẩn (mỗi ký tự 8 bit).</li>
<li><strong>Sau mã hoá:</strong> Chuỗi bit được rút gọn đáng kể nhờ các ký tự xuất hiện nhiều (như dấu cách, chữ 'a', 'o', 'h') được gán mã ngắn.</li>
</ul>
<p><gap></gap></p>
<p><img src="images/3.3.png" alt="" style="width:900px;" /></p>
<p><gap></gap></p>
<ul>
<li><em>Lưu ý:</em> Cây Huffman hoặc bảng mã cần được lưu kèm hoặc gửi kèm ở phần đầu file nén để bộ giải mã có thể hiểu được.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="v%C3%AD-d%E1%BB%A5-m%C3%A3-huffman-2">Ví dụ mã Huffman (2)</h1>
<div class="columns">
<div class="col-2">
<ul>
<li><strong>Các bước thực hiện:</strong>
<ol>
<li>Tính tần suất xuất hiện của từng ký tự.</li>
<li>Sắp xếp theo xác suất giảm dần.</li>
<li>Xây dựng cây Huffman bằng cách gộp 2 nút có tần suất nhỏ nhất.</li>
</ol>
</li>
</ul>
</div>
<div class="col-5">
<p><img src="images/3.4.png" alt="" /></p>
</div>
</div>
<ul>
<ol start="4">
<li>Gán bit 0 cho nhánh trái, 1 cho nhánh phải.</li>
<li>Đọc đường đi từ gốc đến lá để ra mã của từng ký tự.</li>
</ol>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="th%E1%BB%B1c-h%C3%A0nh-x%C3%A2y-d%E1%BB%B1ng-c%C3%A2y-huffman-v%C3%A0-m%C3%A3-h%C3%B3a-chu%E1%BB%97i">Thực hành Xây dựng cây Huffman và mã hóa chuỗi.</h1>
<p><gap></gap></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> heapq

<span class="hljs-keyword">class</span> <span class="hljs-title class_">Node</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, char, freq</span>):
        <span class="hljs-variable language_">self</span>.char = char
        <span class="hljs-variable language_">self</span>.freq = freq
        <span class="hljs-variable language_">self</span>.left = <span class="hljs-literal">None</span>
        <span class="hljs-variable language_">self</span>.right = <span class="hljs-literal">None</span>
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__lt__</span>(<span class="hljs-params">self, other</span>):
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">self</span>.freq &lt; other.freq

<span class="hljs-keyword">def</span> <span class="hljs-title function_">build_huffman_tree</span>(<span class="hljs-params">text</span>):
    freq = {}
    <span class="hljs-keyword">for</span> char <span class="hljs-keyword">in</span> text:
        freq[char] = freq.get(char, <span class="hljs-number">0</span>) + <span class="hljs-number">1</span>
    heap = [Node(char, f) <span class="hljs-keyword">for</span> char, f <span class="hljs-keyword">in</span> freq.items()]
    heapq.heapify(heap)
    <span class="hljs-keyword">while</span> <span class="hljs-built_in">len</span>(heap) &gt; <span class="hljs-number">1</span>:
        left = heapq.heappop(heap)
        right = heapq.heappop(heap)
        merged = Node(<span class="hljs-literal">None</span>, left.freq + right.freq)
        merged.left = left
        merged.right = right
        heapq.heappush(heap, merged)
    <span class="hljs-keyword">return</span> heap[<span class="hljs-number">0</span>]

<span class="hljs-keyword">def</span> <span class="hljs-title function_">generate_codes</span>(<span class="hljs-params">node, prefix=<span class="hljs-string">&quot;&quot;</span>, code_map={}</span>):
    <span class="hljs-keyword">if</span> node <span class="hljs-keyword">is</span> <span class="hljs-keyword">not</span> <span class="hljs-literal">None</span>:
        <span class="hljs-keyword">if</span> node.char <span class="hljs-keyword">is</span> <span class="hljs-keyword">not</span> <span class="hljs-literal">None</span>:
            code_map[node.char] = prefix
        generate_codes(node.left, prefix + <span class="hljs-string">&quot;0&quot;</span>, code_map)
        generate_codes(node.right, prefix + <span class="hljs-string">&quot;1&quot;</span>, code_map)
    <span class="hljs-keyword">return</span> code_map

text = <span class="hljs-string">&quot;aabbc&quot;</span>
tree = build_huffman_tree(text)
codes = generate_codes(tree)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Mã Huffman:&quot;</span>, codes)
</code></pre>

<h1 id="gi%E1%BA%A3i-m%C3%A3-huffman">Giải mã Huffman</h1>
<ul>
<li><strong>Nguyên lý:</strong> Dựa vào cây Huffman đã được xây dựng để dịch ngược chuỗi bit về ký tự.</li>
<li><strong>Quy trình:</strong>
<ol>
<li>Đọc lần lượt từng bit từ luồng dữ liệu nén.</li>
<li>Bắt đầu từ nút gốc (root) của cây Huffman.</li>
<li>Gặp bit 0 rẽ trái, gặp bit 1 rẽ phải.</li>
<li>Khi đến nút lá (leaf), ta được một ký tự gốc. Xuất ký tự này ra.</li>
<li>Quay lại nút gốc và tiếp tục đọc bit tiếp theo cho đến hết luồng dữ liệu.</li>
</ol>
</li>
</ul>
</section>

<h1 id="th%E1%BB%B1c-h%C3%A0nh-m%C3%A3-h%C3%B3a-v%C3%A0-gi%E1%BA%A3i-m%C3%A3-golomb-rice">Thực hành Mã hóa và giải mã Golomb-Rice.</h1>
<p><gap></gap></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">golomb_rice_encode</span>(<span class="hljs-params">n, k</span>):
    M = <span class="hljs-number">2</span> ** k
    q = n // M
    r = n % M
    quotient_bits = <span class="hljs-string">&#x27;0&#x27;</span> * q + <span class="hljs-string">&#x27;1&#x27;</span>
    remainder_bits = <span class="hljs-string">f&quot;<span class="hljs-subst">{r:<span class="hljs-number">0</span>{k}</span>b}&quot;</span>
    <span class="hljs-keyword">return</span> quotient_bits + remainder_bits

<span class="hljs-keyword">def</span> <span class="hljs-title function_">golomb_rice_decode</span>(<span class="hljs-params">bits, k</span>):
    q = <span class="hljs-number">0</span>
    <span class="hljs-keyword">for</span> bit <span class="hljs-keyword">in</span> bits:
        <span class="hljs-keyword">if</span> bit == <span class="hljs-string">&#x27;0&#x27;</span>: q += <span class="hljs-number">1</span>
        <span class="hljs-keyword">else</span>: <span class="hljs-keyword">break</span>
    r_bits = bits[q+<span class="hljs-number">1</span> : q+<span class="hljs-number">1</span>+k]
    r = <span class="hljs-built_in">int</span>(r_bits, <span class="hljs-number">2</span>)
    <span class="hljs-keyword">return</span> q * (<span class="hljs-number">2</span> ** k) + r

n = <span class="hljs-number">13</span>
k = <span class="hljs-number">2</span>
encoded = golomb_rice_encode(n, k)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Mã hóa <span class="hljs-subst">{n}</span> với k=<span class="hljs-subst">{k}</span>: <span class="hljs-subst">{encoded}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Giải mã: <span class="hljs-subst">{golomb_rice_decode(encoded, k)}</span>&quot;</span>)
</code></pre>

<h1 id="m%C3%A3-s%E1%BB%91-h%E1%BB%8Dc-arithmetic-coding">Mã số học (Arithmetic Coding)</h1>
<div class="columns">
<div class="col-2">
<ul>
<li><strong>Khác biệt với Huffman:</strong> Không ánh xạ 1-1 giữa ký tự và mã. Một chuỗi ký tự dài được ánh xạ vào một khoảng số thực duy nhất trong <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="4.778ex" height="2.262ex" role="img" focusable="false" viewBox="0 -750 2111.7 1000"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="5B" d="M118 -250V750H255V710H158V-210H255V-250H118Z"></path></g><g data-mml-node="mn" transform="translate(278,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g><g data-mml-node="mo" transform="translate(778,0)"><path data-c="2C" d="M78 35T78 60T94 103T137 121Q165 121 187 96T210 8Q210 -27 201 -60T180 -117T154 -158T130 -185T117 -194Q113 -194 104 -185T95 -172Q95 -168 106 -156T131 -126T157 -76T173 -3V9L172 8Q170 7 167 6T161 3T152 1T140 0Q113 0 96 17Z"></path></g><g data-mml-node="mn" transform="translate(1222.7,0)"><path data-c="31" d="M213 578L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3Q121 3 100 0H88V46H114Q136 46 152 46T177 47T193 50T201 52T207 57T213 61V578Z"></path></g><g data-mml-node="mo" transform="translate(1722.7,0)"><path data-c="29" d="M60 749L64 750Q69 750 74 750H86L114 726Q208 641 251 514T294 250Q294 182 284 119T261 12T224 -76T186 -143T145 -194T113 -227T90 -246Q87 -249 86 -250H74Q66 -250 63 -250T58 -247T55 -238Q56 -237 66 -225Q221 -64 221 250T66 725Q56 737 55 738Q55 746 60 749Z"></path></g></g></g></svg></mjx-container>.</li>
<li><strong>Ý tưởng:</strong> Mỗi ký tự làm thu hẹp dần một khoảng. Sau khi xử lý hết chuỗi, chỉ cần chọn một số nằm trong khoảng cuối cùng.</li>
<li><strong>Ưu điểm:</strong> Vượt qua giới hạn 1 bit/ký tự của Huffman, tiệm cận giới hạn Entropy của Shannon.</li>
</ul>

<li><strong>Kết quả:</strong> Bất kỳ số nào trong khoảng <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="9.429ex" height="2.262ex" role="img" focusable="false" viewBox="0 -750 4167.7 1000"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="5B" d="M118 -250V750H255V710H158V-210H255V-250H118Z"></path></g><g data-mml-node="mn" transform="translate(278,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path><path data-c="2E" d="M78 60Q78 84 95 102T138 120Q162 120 180 104T199 61Q199 36 182 18T139 0T96 17T78 60Z" transform="translate(500,0)"></path><path data-c="32" d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z" transform="translate(778,0)"></path><path data-c="35" d="M164 157Q164 133 148 117T109 101H102Q148 22 224 22Q294 22 326 82Q345 115 345 210Q345 313 318 349Q292 382 260 382H254Q176 382 136 314Q132 307 129 306T114 304Q97 304 95 310Q93 314 93 485V614Q93 664 98 664Q100 666 102 666Q103 666 123 658T178 642T253 634Q324 634 389 662Q397 666 402 666Q410 666 410 648V635Q328 538 205 538Q174 538 149 544L139 546V374Q158 388 169 396T205 412T256 420Q337 420 393 355T449 201Q449 109 385 44T229 -22Q148 -22 99 32T50 154Q50 178 61 192T84 210T107 214Q132 214 148 197T164 157Z" transform="translate(1278,0)"></path></g><g data-mml-node="mo" transform="translate(2056,0)"><path data-c="2C" d="M78 35T78 60T94 103T137 121Q165 121 187 96T210 8Q210 -27 201 -60T180 -117T154 -158T130 -185T117 -194Q113 -194 104 -185T95 -172Q95 -168 106 -156T131 -126T157 -76T173 -3V9L172 8Q170 7 167 6T161 3T152 1T140 0Q113 0 96 17Z"></path></g><g data-mml-node="mn" transform="translate(2500.7,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path><path data-c="2E" d="M78 60Q78 84 95 102T138 120Q162 120 180 104T199 61Q199 36 182 18T139 0T96 17T78 60Z" transform="translate(500,0)"></path><path data-c="34" d="M462 0Q444 3 333 3Q217 3 199 0H190V46H221Q241 46 248 46T265 48T279 53T286 61Q287 63 287 115V165H28V211L179 442Q332 674 334 675Q336 677 355 677H373L379 671V211H471V165H379V114Q379 73 379 66T385 54Q393 47 442 46H471V0H462ZM293 211V545L74 212L183 211H293Z" transform="translate(778,0)"></path></g><g data-mml-node="mo" transform="translate(3778.7,0)"><path data-c="29" d="M60 749L64 750Q69 750 74 750H86L114 726Q208 641 251 514T294 250Q294 182 284 119T261 12T224 -76T186 -143T145 -194T113 -227T90 -246Q87 -249 86 -250H74Q66 -250 63 -250T58 -247T55 -238Q56 -237 66 -225Q221 -64 221 250T66 725Q56 737 55 738Q55 746 60 749Z"></path></g></g></g></svg></mjx-container> (ví dụ: 0.3) đều đại diện cho chuỗi &quot;AB&quot;.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="gi%E1%BA%A3i-m%C3%A3-s%E1%BB%91-h%E1%BB%8Dc-arithmetic-decoding">Giải mã Số học (Arithmetic Decoding)</h1>
<ul>
<li><strong>Nguyên lý:</strong> Xác định xem con số thực nằm trong khoảng con của ký tự nào để suy ra ký tự đó.</li>
<li><strong>Quy trình:</strong>
<ol>
<li>Khởi tạo khoảng hiện tại là <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="4.778ex" height="2.262ex" role="img" focusable="false" viewBox="0 -750 2111.7 1000"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="5B" d="M118 -250V750H255V710H158V-210H255V-250H118Z"></path></g><g data-mml-node="mn" transform="translate(278,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g><g data-mml-node="mo" transform="translate(778,0)"><path data-c="2C" d="M78 35T78 60T94 103T137 121Q165 121 187 96T210 8Q210 -27 201 -60T180 -117T154 -158T130 -185T117 -194Q113 -194 104 -185T95 -172Q95 -168 106 -156T131 -126T157 -76T173 -3V9L172 8Q170 7 167 6T161 3T152 1T140 0Q113 0 96 17Z"></path></g><g data-mml-node="mn" transform="translate(1222.7,0)"><path data-c="31" d="M213 578L200 573Q186 568 160 563T102 556H83V602H102Q149 604 189 617T245 641T273 663Q275 666 285 666Q294 666 302 660V361L303 61Q310 54 315 52T339 48T401 46H427V0H416Q395 3 257 3Q121 3 100 0H88V46H114Q136 46 152 46T177 47T193 50T201 52T207 57T213 61V578Z"></path></g><g data-mml-node="mo" transform="translate(1722.7,0)"><path data-c="29" d="M60 749L64 750Q69 750 74 750H86L114 726Q208 641 251 514T294 250Q294 182 284 119T261 12T224 -76T186 -143T145 -194T113 -227T90 -246Q87 -249 86 -250H74Q66 -250 63 -250T58 -247T55 -238Q56 -237 66 -225Q221 -64 221 250T66 725Q56 737 55 738Q55 746 60 749Z"></path></g></g></g></svg></mjx-container>.</li>
<li>Dựa vào bảng xác suất, chia khoảng hiện tại thành các khoảng con.</li>
<li>Kiểm tra xem con số giải mã nằm trong khoảng con của ký tự nào <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Xuất ký tự đó.</li>
<li>Thu hẹp khoảng hiện tại thành đúng khoảng con vừa tìm được.</li>
<li>Lặp lại cho đến khi giải mã đủ số lượng ký tự.</li>
</ol>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="th%E1%BB%B1c-h%C3%A0nh-m%C3%A3-h%C3%B3a-s%E1%BB%91-h%E1%BB%8Dc">Thực hành Mã hóa số học.</h1>
<p><gap></gap></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">arithmetic_encode</span>(<span class="hljs-params">message, probs</span>):
    low, high = <span class="hljs-number">0.0</span>, <span class="hljs-number">1.0</span>
    <span class="hljs-keyword">for</span> char <span class="hljs-keyword">in</span> message:
        range_size = high - low
        cum_prob = <span class="hljs-number">0</span>
        <span class="hljs-keyword">for</span> c, p <span class="hljs-keyword">in</span> probs.items():
            <span class="hljs-keyword">if</span> c == char:
                high = low + range_size * (cum_prob + p)
                low = low + range_size * cum_prob
                <span class="hljs-keyword">break</span>
            cum_prob += p
    <span class="hljs-keyword">return</span> (low + high) / <span class="hljs-number">2</span>

probs = {<span class="hljs-string">&#x27;A&#x27;</span>: <span class="hljs-number">0.5</span>, <span class="hljs-string">&#x27;B&#x27;</span>: <span class="hljs-number">0.3</span>, <span class="hljs-string">&#x27;C&#x27;</span>: <span class="hljs-number">0.2</span>}
message = <span class="hljs-string">&quot;AB&quot;</span>
encoded_value = arithmetic_encode(message, probs)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Giá trị mã hóa số học của &#x27;<span class="hljs-subst">{message}</span>&#x27;: <span class="hljs-subst">{encoded_value}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-lzw-lempel-ziv-welch">Mã LZW (Lempel-Ziv-Welch)</h1>
<ul>
<li><strong>Nguyên lý:</strong> Thay thế các chuỗi lặp lại bằng một mã số ngắn hơn.</li>
<li><strong>Từ điển động:</strong> LZW xây dựng từ điển trong lúc nén. Khi gặp chuỗi đã xuất hiện, thay bằng mã cố định (thường 9-12 bit).</li>
<li><strong>Cách hoạt động:</strong>
<ol>
<li>Khởi tạo từ điển ban đầu với các ký tự đơn.</li>
<li>Đọc dữ liệu đầu vào để tạo chuỗi hiện tại.</li>
<li>Nếu chuỗi mới đã có trong từ điển, tiếp tục mở rộng.</li>
<li>Nếu chưa có, xuất mã của chuỗi cũ và thêm chuỗi mới vào từ điển.</li>
</ol>
</li>
<li><strong>Điểm hay:</strong> Cả bộ nén và giải nén đều tự xây dựng lại cùng một từ điển mà không cần gửi kèm.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="v%C3%AD-d%E1%BB%A5-m%C3%A3-ho%C3%A1-v%E1%BB%9Bi-lzw">Ví dụ mã hoá với LZW</h1>
<div class="columns">
<div>
<ul>
<li><strong>Mã hoá chuỗi:</strong> &quot;ABAABABA&quot;</li>
<li><strong>Từ điển ban đầu:</strong> A: 65, B: 66 (Mã ASCII)</li>
<li><strong>Các mã mới bắt đầu từ 256.</strong></li>
<li><strong>Quá trình:</strong>
<ul>
<li>Đọc 'A': có trong từ điển.</li>
<li>Đọc 'AB': chưa có <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Xuất mã của 'A' (65), thêm 'AB' vào từ điển (mã 256).</li>
<li>Đọc 'B': có.</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/3.8.png" alt="" /></p>
</div>
</div>
<ul>
<ul>
<li>Đọc 'BA': chưa có <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Xuất mã 'B' (66), thêm 'BA' (257).</li>
<li>Đọc 'AAB': chưa có <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Xuất mã 'A' (65), thêm 'AA' (258).</li>
<li>... Tiếp tục cho đến hết chuỗi.</li>
</ul>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="gi%E1%BA%A3i-m%C3%A3-lzw">Giải mã LZW</h1>
<ul>
<li><strong>Nguyên lý:</strong> Bộ giải nén tự động xây dựng lại từ điển y hệt bộ nén.</li>
<li><strong>Quy trình:</strong>
<ol>
<li>Khởi tạo từ điển với các ký tự đơn.</li>
<li>Đọc mã đầu tiên, xuất chuỗi tương ứng, lưu làm <code>Chuỗi_trước</code>.</li>
<li>Đọc mã tiếp theo:
<ul>
<li><em>TH1:</em> Mã đã có <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Xuất chuỗi. Thêm vào từ điển <code>Chuỗi_trước</code> + Ký tự đầu của chuỗi hiện tại.</li>
<li><em>TH2 (Đặc biệt):</em> Mã chưa có <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="2.262ex" height="1.181ex" role="img" focusable="false" viewBox="0 -511 1000 522"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="2192" d="M56 237T56 250T70 270H835Q719 357 692 493Q692 494 692 496T691 499Q691 511 708 511H711Q720 511 723 510T729 506T732 497T735 481T743 456Q765 389 816 336T935 261Q944 258 944 250Q944 244 939 241T915 231T877 212Q836 186 806 152T761 85T740 35T732 4Q730 -6 727 -8T711 -11Q691 -11 691 0Q691 7 696 25Q728 151 835 230H70Q56 237 56 250Z"></path></g></g></g></svg></mjx-container> Thêm <code>Chuỗi_trước</code> + Ký tự đầu của <code>Chuỗi_trước</code>, sau đó xuất chuỗi này.</li>
</ul>
</li>
<li>Cập nhật <code>Chuỗi_trước</code> = chuỗi vừa xuất. Lặp lại.</li>
</ol>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="th%E1%BB%B1c-h%C3%A0nh-n%C3%A9n-lzw">Thực hành Nén LZW.</h1>
<p><gap></gap></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">lzw_compress</span>(<span class="hljs-params">text</span>):
    dict_size = <span class="hljs-number">256</span>
    dictionary = {<span class="hljs-built_in">chr</span>(i): i <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(dict_size)}
    w = <span class="hljs-string">&quot;&quot;</span>
    compressed = []
    <span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> text:
        wc = w + c
        <span class="hljs-keyword">if</span> wc <span class="hljs-keyword">in</span> dictionary:
            w = wc
        <span class="hljs-keyword">else</span>:
            compressed.append(dictionary[w])
            dictionary[wc] = dict_size
            dict_size += <span class="hljs-number">1</span>
            w = c
    <span class="hljs-keyword">if</span> w:
        compressed.append(dictionary[w])
    <span class="hljs-keyword">return</span> compressed

text = <span class="hljs-string">&quot;ABAABABA&quot;</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Mã LZW:&quot;</span>, lzw_compress(text))
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-h%C3%B3a-%C4%91%E1%BB%99-d%C3%A0i-run-run-length-encoding---rle">Mã hóa độ dài Run (Run-Length Encoding - RLE)</h1>
<div class="columns">
<div>
<ul>
<li><strong>Nguyên lý:</strong> Thay thế chuỗi các pixel giống hệt nhau bằng cặp (Giá trị, Độ dài).</li>
<li><strong>Chuẩn CCITT Group 3 &amp; 4:</strong> Dùng cho ảnh nhị phân (Fax).
<ul>
<li>Group 4 sử dụng mã hóa 2D (READ) tham chiếu dòng trước đó để nén tốt hơn.</li>
</ul>
</li>
</ul>
</div>
<div>
<gap></gap>
<p><img src="images/3.9.png" alt="" /></p>
</div>
</div>
<ul>
<li><strong>Giải mã:</strong> Đọc từng cặp (Giá trị, Độ dài) và ghi liên tiếp Giá trị đó vào ảnh với số lượng bằng Độ dài.</li>
</ul>
<p><gap></gap></p>
<p><img src="images/3.10.png" alt="" style="width:1000px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-h%C3%B3a-symbol-based-jbig2">Mã hóa Symbol-based (JBIG2)</h1>
<ul>
<li><strong>Nguyên lý:</strong> Tạo từ điển các ký hiệu (ví dụ: ký tự 'a', 'b', hoặc các mẫu lặp lại).</li>
<li><strong>Cách hoạt động:</strong> Thay thế các vùng giống nhau trong ảnh bằng tọa độ và token tham chiếu đến từ điển.</li>
<li><strong>Ví dụ:</strong> Dữ liệu đầu vào là ảnh quét của chuỗi &quot;banana&quot;.<br />
<gap></gap></li>
</ul>
<p><img src="images/3.11.png" alt="" style="width:900px;" /></p>
<p><gap></gap></p>
<ul>
<li><strong>Giải mã:</strong> Giải nén từ điển ký hiệu và luồng tọa độ, sau đó &quot;dán&quot; (paste) các mẫu ký hiệu lên đúng vị trí (X, Y) trên nền trang trắng. Rất hiệu quả cho tài liệu văn bản quét.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-ho%C3%A1-bit-plane">Mã hoá bit-plane</h1>
<div class="columns">
<div class="col-4">
<ul>
<li><strong>Khái niệm:</strong> Biểu diễn một ảnh <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.986ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 878 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D45A" d="M21 287Q22 293 24 303T36 341T56 388T88 425T132 442T175 435T205 417T221 395T229 376L231 369Q231 367 232 367L243 378Q303 442 384 442Q401 442 415 440T441 433T460 423T475 411T485 398T493 385T497 373T500 364T502 357L510 367Q573 442 659 442Q713 442 746 415T780 336Q780 285 742 178T704 50Q705 36 709 31T724 26Q752 26 776 56T815 138Q818 149 821 151T837 153Q857 153 857 145Q857 144 853 130Q845 101 831 73T785 17T716 -10Q669 -10 648 17T627 73Q627 92 663 193T700 345Q700 404 656 404H651Q565 404 506 303L499 291L466 157Q433 26 428 16Q415 -11 385 -11Q372 -11 364 -4T353 8T350 18Q350 29 384 161L420 307Q423 322 423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 112 181Q151 335 151 342Q154 357 154 369Q154 405 129 405Q107 405 92 377T69 316T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container>-bit bằng cách tách nó thành <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.986ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 878 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D45A" d="M21 287Q22 293 24 303T36 341T56 388T88 425T132 442T175 435T205 417T221 395T229 376L231 369Q231 367 232 367L243 378Q303 442 384 442Q401 442 415 440T441 433T460 423T475 411T485 398T493 385T497 373T500 364T502 357L510 367Q573 442 659 442Q713 442 746 415T780 336Q780 285 742 178T704 50Q705 36 709 31T724 26Q752 26 776 56T815 138Q818 149 821 151T837 153Q857 153 857 145Q857 144 853 130Q845 101 831 73T785 17T716 -10Q669 -10 648 17T627 73Q627 92 663 193T700 345Q700 404 656 404H651Q565 404 506 303L499 291L466 157Q433 26 428 16Q415 -11 385 -11Q372 -11 364 -4T353 8T350 18Q350 29 384 161L420 307Q423 322 423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 112 181Q151 335 151 342Q154 357 154 369Q154 405 129 405Q107 405 92 377T69 316T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container> ảnh nhị phân riêng biệt. Mỗi mặt phẳng bit chứa một bit tại cùng vị trí của tất cả pixel.</li>
<li><strong>Ví dụ:</strong> Với ảnh 8 bit, bit cao nhất chứa cấu trúc cường độ chính, các bit thấp hơn mô tả chi tiết tinh và dễ bị nhiễu hơn.</li>
</ul>
</div>
<div class="col-5">
<p><img src="images/3.12.png" alt="" /></p>
</div>
</div>
<ul>
<li><strong>Xử lý:</strong> Các bit-plane có thể được nén hoặc xử lý riêng tùy theo mức độ quan trọng.</li>
<li><strong>Giải mã:</strong> Dịch chuyển (shift) các bit của từng mặt phẳng nhị phân về lại đúng vị trí, thực hiện phép toán OR (|) để ghép <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.986ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 878 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D45A" d="M21 287Q22 293 24 303T36 341T56 388T88 425T132 442T175 435T205 417T221 395T229 376L231 369Q231 367 232 367L243 378Q303 442 384 442Q401 442 415 440T441 433T460 423T475 411T485 398T493 385T497 373T500 364T502 357L510 367Q573 442 659 442Q713 442 746 415T780 336Q780 285 742 178T704 50Q705 36 709 31T724 26Q752 26 776 56T815 138Q818 149 821 151T837 153Q857 153 857 145Q857 144 853 130Q845 101 831 73T785 17T716 -10Q669 -10 648 17T627 73Q627 92 663 193T700 345Q700 404 656 404H651Q565 404 506 303L499 291L466 157Q433 26 428 16Q415 -11 385 -11Q372 -11 364 -4T353 8T350 18Q350 29 384 161L420 307Q423 322 423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 112 181Q151 335 151 342Q154 357 154 369Q154 405 129 405Q107 405 92 377T69 316T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container> mặt phẳng thành ảnh gốc.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="34" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="n%C3%A9n-c%C3%B3-t%E1%BB%95n-th%E1%BA%A5t-lossy">NÉN CÓ TỔN THẤT (LOSSY)</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="%C4%91%E1%BB%8Bnh-ngh%C4%A9a-1">Định nghĩa</h1>
<ul>
<li>Các phương pháp nén chấp nhận loại bỏ một phần thông tin để đạt tỷ lệ nén cao.</li>
<li>Tận dụng các đặc điểm của hệ thống thị giác con người (HVS) để loại bỏ thông tin ít nhạy cảm.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-h%C3%B3a-bi%E1%BA%BFn-%C4%91%E1%BB%95i-kh%E1%BB%91i-block-transform-coding">Mã hóa biến đổi khối (Block Transform Coding)</h1>
<ul>
<li><strong>Mục tiêu:</strong> Loại bỏ dư thừa dữ liệu để giảm dung lượng mà vẫn giữ chất lượng ảnh ở mức chấp nhận được.</li>
<li><strong>Quy trình chi tiết:</strong>
<ol>
<li><strong>Chia khối (Blocking):</strong> Chia ảnh thành các khối pixel nhỏ (thường 8x8).</li>
<li><strong>Biến đổi (Transform):</strong> Chuyển đổi giá trị pixel thành hệ số tần số (phổ biến nhất là DCT - Discrete Cosine Transform).</li>
<li><strong>Lượng tử hóa (Quantization):</strong> Làm tròn các hệ số, loại bỏ thông tin ít quan trọng.</li>
<li><strong>Mã hóa (Coding):</strong> Mã hóa các hệ số đã lượng tử hóa (thường dùng Zigzag + RLE + Huffman).</li>
</ol>
</li>
</ul>
<p><img src="images/3.13.png" alt="" /></p>
<ul>
<li><strong>Phân bổ Bit:</strong> Zonal Coding (giữ hệ số có phương sai lớn nhất) hoặc Threshold Coding (giữ N hệ số có độ lớn tuyệt đối lớn nhất).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="minh-ho%E1%BA%A1-m%C3%A3-ho%C3%A1-kh%E1%BB%91i">Minh hoạ mã hoá khối</h1>
<div class="columns">
<div class="col-3">
<ul>
<li><strong>Đầu vào:</strong> Một khối pixel 8x8.</li>
<li><strong>Biến đổi DCT:</strong> Chuyển từ miền không gian sang miền tần số. Hệ số DC (góc trái trên) đại diện cho thành phần tần số thấp (thông tin nền), các hệ số AC đại diện cho tần số cao (chi tiết, biên).</li>
</ul>
</div>
<div class="col-5">
<p><img src="images/3.14.png" alt="" /></p>
</div>
</div>
<ul>
<li><strong>Lượng tử hóa:</strong> Chia các hệ số cho ma trận lượng tử hóa (Q-table) và làm tròn. Nhiều hệ số tần số cao trở thành 0.</li>
<li><strong>Mã hóa:</strong> Quét zigzag để gom các số 0 lại, sau đó dùng RLE và Huffman để mã hóa.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="gi%E1%BA%A3i-m%C3%A3-bi%E1%BA%BFn-%C4%91%E1%BB%95i-kh%E1%BB%91i">Giải mã Biến đổi khối</h1>
<ul>
<li><strong>Quy trình:</strong>
<ol>
<li><strong>Giải mã Entropy:</strong> Dùng Huffman/Arithmetic để giải mã luồng bit, khôi phục các hệ số DCT.</li>
<li><strong>Giải lượng tử hóa (Inverse Quantization):</strong> Nhân từng hệ số với giá trị tương ứng trong Ma trận lượng tử. (Lưu ý: Bước này gây tổn thất vĩnh viễn, các số 0 không thể khôi phục chính xác).</li>
<li><strong>Biến đổi ngược DCT (IDCT):</strong> Áp dụng IDCT lên khối <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.05ex;" xmlns="http://www.w3.org/2000/svg" width="5.028ex" height="1.557ex" role="img" focusable="false" viewBox="0 -666 2222.4 688"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mn"><path data-c="38" d="M70 417T70 494T124 618T248 666Q319 666 374 624T429 515Q429 485 418 459T392 417T361 389T335 371T324 363L338 354Q352 344 366 334T382 323Q457 264 457 174Q457 95 399 37T249 -22Q159 -22 101 29T43 155Q43 263 172 335L154 348Q133 361 127 368Q70 417 70 494ZM286 386L292 390Q298 394 301 396T311 403T323 413T334 425T345 438T355 454T364 471T369 491T371 513Q371 556 342 586T275 624Q268 625 242 625Q201 625 165 599T128 534Q128 511 141 492T167 463T217 431Q224 426 228 424L286 386ZM250 21Q308 21 350 55T392 137Q392 154 387 169T375 194T353 216T330 234T301 253T274 270Q260 279 244 289T218 306L210 311Q204 311 181 294T133 239T107 157Q107 98 150 60T250 21Z"></path></g><g data-mml-node="mo" transform="translate(722.2,0)"><path data-c="D7" d="M630 29Q630 9 609 9Q604 9 587 25T493 118L389 222L284 117Q178 13 175 11Q171 9 168 9Q160 9 154 15T147 29Q147 36 161 51T255 146L359 250L255 354Q174 435 161 449T147 471Q147 480 153 485T168 490Q173 490 175 489Q178 487 284 383L389 278L493 382Q570 459 587 475T609 491Q630 491 630 471Q630 464 620 453T522 355L418 250L522 145Q606 61 618 48T630 29Z"></path></g><g data-mml-node="mn" transform="translate(1722.4,0)"><path data-c="38" d="M70 417T70 494T124 618T248 666Q319 666 374 624T429 515Q429 485 418 459T392 417T361 389T335 371T324 363L338 354Q352 344 366 334T382 323Q457 264 457 174Q457 95 399 37T249 -22Q159 -22 101 29T43 155Q43 263 172 335L154 348Q133 361 127 368Q70 417 70 494ZM286 386L292 390Q298 394 301 396T311 403T323 413T334 425T345 438T355 454T364 471T369 491T371 513Q371 556 342 586T275 624Q268 625 242 625Q201 625 165 599T128 534Q128 511 141 492T167 463T217 431Q224 426 228 424L286 386ZM250 21Q308 21 350 55T392 137Q392 154 387 169T375 194T353 216T330 234T301 253T274 270Q260 279 244 289T218 306L210 311Q204 311 181 294T133 239T107 157Q107 98 150 60T250 21Z"></path></g></g></g></svg></mjx-container> để chuyển ngược về miền không gian.</li>
<li><strong>Ghép khối:</strong> Đặt các khối <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.05ex;" xmlns="http://www.w3.org/2000/svg" width="5.028ex" height="1.557ex" role="img" focusable="false" viewBox="0 -666 2222.4 688"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mn"><path data-c="38" d="M70 417T70 494T124 618T248 666Q319 666 374 624T429 515Q429 485 418 459T392 417T361 389T335 371T324 363L338 354Q352 344 366 334T382 323Q457 264 457 174Q457 95 399 37T249 -22Q159 -22 101 29T43 155Q43 263 172 335L154 348Q133 361 127 368Q70 417 70 494ZM286 386L292 390Q298 394 301 396T311 403T323 413T334 425T345 438T355 454T364 471T369 491T371 513Q371 556 342 586T275 624Q268 625 242 625Q201 625 165 599T128 534Q128 511 141 492T167 463T217 431Q224 426 228 424L286 386ZM250 21Q308 21 350 55T392 137Q392 154 387 169T375 194T353 216T330 234T301 253T274 270Q260 279 244 289T218 306L210 311Q204 311 181 294T133 239T107 157Q107 98 150 60T250 21Z"></path></g><g data-mml-node="mo" transform="translate(722.2,0)"><path data-c="D7" d="M630 29Q630 9 609 9Q604 9 587 25T493 118L389 222L284 117Q178 13 175 11Q171 9 168 9Q160 9 154 15T147 29Q147 36 161 51T255 146L359 250L255 354Q174 435 161 449T147 471Q147 480 153 485T168 490Q173 490 175 489Q178 487 284 383L389 278L493 382Q570 459 587 475T609 491Q630 491 630 471Q630 464 620 453T522 355L418 250L522 145Q606 61 618 48T630 29Z"></path></g><g data-mml-node="mn" transform="translate(1722.4,0)"><path data-c="38" d="M70 417T70 494T124 618T248 666Q319 666 374 624T429 515Q429 485 418 459T392 417T361 389T335 371T324 363L338 354Q352 344 366 334T382 323Q457 264 457 174Q457 95 399 37T249 -22Q159 -22 101 29T43 155Q43 263 172 335L154 348Q133 361 127 368Q70 417 70 494ZM286 386L292 390Q298 394 301 396T311 403T323 413T334 425T345 438T355 454T364 471T369 491T371 513Q371 556 342 586T275 624Q268 625 242 625Q201 625 165 599T128 534Q128 511 141 492T167 463T217 431Q224 426 228 424L286 386ZM250 21Q308 21 350 55T392 137Q392 154 387 169T375 194T353 216T330 234T301 253T274 270Q260 279 244 289T218 306L210 311Q204 311 181 294T133 239T107 157Q107 98 150 60T250 21Z"></path></g></g></g></svg></mjx-container> về đúng vị trí để tạo thành bức ảnh hoàn chỉnh.</li>
</ol>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="44">
<h1 id="m%C3%A3-h%C3%B3a-d%E1%BB%B1-%C4%91o%C3%A1n-predictive-codingdpcm">Mã hóa dự đoán (Predictive Coding/DPCM)</h1>
<ul>

<h1 id="th%E1%BB%B1c-h%C3%A0nh-m%C3%A3-h%C3%B3a-v%C3%A0-gi%E1%BA%A3i-m%C3%A3-dpcm">Thực hành mã hóa và giải mã DPCM.</h1>
<p><gap></gap></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">dpcm_encode</span>(<span class="hljs-params">signal</span>):
    encoded = [signal[<span class="hljs-number">0</span>]]
    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-built_in">len</span>(signal)):
        predicted = signal[i-<span class="hljs-number">1</span>]
        error = signal[i] - predicted
        encoded.append(error)
    <span class="hljs-keyword">return</span> encoded

<span class="hljs-keyword">def</span> <span class="hljs-title function_">dpcm_decode</span>(<span class="hljs-params">encoded</span>):
    decoded = [encoded[<span class="hljs-number">0</span>]]
    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-built_in">len</span>(encoded)):
        predicted = decoded[i-<span class="hljs-number">1</span>]
        decoded.append(predicted + encoded[i])
    <span class="hljs-keyword">return</span> decoded

signal = [<span class="hljs-number">150</span>, <span class="hljs-number">152</span>, <span class="hljs-number">149</span>, <span class="hljs-number">151</span>]
encoded = dpcm_encode(signal)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Mã hóa DPCM:&quot;</span>, encoded)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Giải mã DPCM:&quot;</span>, dpcm_decode(encoded))
</code></pre>
</section>

<h1 id="m%C3%A3-h%C3%B3a-wavelet">Mã hóa Wavelet</h1>
<ul>
<li><strong>Khái niệm:</strong> Phương pháp nén ảnh dùng biến đổi wavelet rời rạc (DWT). Khắc phục nhược điểm artifact khối của DCT (JPEG) khi nén tỷ lệ cao.</li>
<li><strong>Đặc trưng:</strong>
<ul>
<li>Biến đổi toàn ảnh, không chia khối.</li>
<li>Biểu diễn đa phân giải (multiresolution).</li>
<li>Hỗ trợ cả nén lossless và lossy.</li>
<li>Cho phép truyền ảnh tiến triển (progressive).</li>
</ul>
</li>
</ul>
<div class="columns">
<div>
<ul>
<li><strong>Chuẩn tiêu biểu:</strong> JPEG 2000.</li>
</ul>
</div>
<div class="col-3">
<gap></gap>
<p><img src="images/3.15.png" alt="" /></p>
</div>
</div>
<ul>
<li><strong>Các bước:</strong>
<ol>

<li>Lượng tử hóa: Chia mỗi hệ số cho bước lượng tử.</li>
<li>Mã hóa entropy: Dùng mã hóa bit-plane + mã hóa số học (EZW, SPIHT, EBCOT).</li>
</ol>
</li>
</ul>

<h1 id="gi%E1%BA%A3i-m%C3%A3-wavelet">Giải mã Wavelet</h1>
<ul>
<li><strong>Quy trình:</strong>
<ol>
<li><strong>Giải mã Entropy:</strong> Giải mã luồng bit (thường dùng Arithmetic Coding kết hợp EZW, SPIHT, EBCOT) để khôi phục các hệ số Wavelet.</li>
<li><strong>Giải lượng tử hóa:</strong> Nhân các hệ số với bước lượng tử (hoặc dùng bước = 1 nếu là lossless).</li>
<li><strong>Biến đổi Wavelet ngược (IDWT):</strong> Tổng hợp lại ảnh từ các băng con (sub-bands) tần số thấp và cao để tạo ra ảnh ở độ phân giải gốc.</li>
</ol>
</li>
<li><strong>Ưu điểm:</strong> Quá trình này không gây ra hiệu ứng khối (blocking artifact) như JPEG thông thường, cho phép nén tỷ lệ cao mà vẫn giữ được độ mượt của ảnh.</li>
</ul>
