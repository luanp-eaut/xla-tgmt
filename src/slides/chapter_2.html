<li>3 phương pháp chính:
<ul>

<li><strong>Cắt mức xám (Gray-level slicing)</strong>: Làm nổi bật một dải mức xám cụ thể (ví dụ: khối u trong ảnh y tế).</li>
</ul>

<h1 id="bi%E1%BA%BFn-%C4%91%E1%BB%95i-c%C6%B0%E1%BB%9Dng-%C4%91%E1%BB%99---b%C3%A0i-t%E1%BA%ADp-th%E1%BB%B1c-h%C3%A0nh">Biến đổi cường độ - Bài tập thực hành</h1>
<ul>
<li>Viết code Python sử dụng OpenCV để tạo ảnh âm bản và biến đổi Gamma.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

<span class="hljs-comment"># Đọc ảnh grayscale</span>
img = cv2.imread(<span class="hljs-string">&#x27;input.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># 1. Ảnh âm bản</span>
negative = <span class="hljs-number">255</span> - img

<span class="hljs-comment"># 2. Biến đổi Gamma (gamma = 0.5)</span>
gamma = <span class="hljs-number">0.5</span>
lookUpTable = np.empty((<span class="hljs-number">1</span>,<span class="hljs-number">256</span>), np.uint8)
<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">256</span>):
    lookUpTable[<span class="hljs-number">0</span>,i] = np.clip(<span class="hljs-built_in">pow</span>(i / <span class="hljs-number">255.0</span>, gamma) * <span class="hljs-number">255.0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">255</span>)
gamma_img = cv2.LUT(img, lookUpTable)

<span class="hljs-comment"># Hiển thị</span>
titles = [<span class="hljs-string">&#x27;Gốc&#x27;</span>, <span class="hljs-string">&#x27;Âm bản&#x27;</span>, <span class="hljs-string">f&#x27;Gamma=<span class="hljs-subst">{gamma}</span>&#x27;</span>]
images = [img, negative, gamma_img]
<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">3</span>):
    plt.subplot(<span class="hljs-number">1</span>, <span class="hljs-number">3</span>, i+<span class="hljs-number">1</span>), plt.imshow(images[i], cmap=<span class="hljs-string">&#x27;gray&#x27;</span>)
    plt.title(titles[i]), plt.axis(<span class="hljs-string">&#x27;off&#x27;</span>)
plt.show()
</code></pre>
</section>

<h1 id="l%E1%BB%8Dc-kh%C3%B4ng-gian-spatial-filtering">Lọc không gian (Spatial Filtering)</h1>
<ul>
<li><strong>Định nghĩa</strong>: Là kỹ thuật thay đổi giá trị của một pixel dựa trên giá trị của các pixel lân cận xung quanh nó. Là công cụ chủ chốt để làm mịn ảnh hoặc làm nét ảnh.</li>

<h1 id="ph%C3%A2n-lo%E1%BA%A1i-b%E1%BB%99-l%E1%BB%8Dc-kh%C3%B4ng-gian">Phân loại bộ lọc không gian</h1>
<ul>
<li>Bộ lọc làm mịn (Smoothing Filters)
<ul>
<li><strong>Tên gọi khác</strong>: Bộ lọc thông thấp (Low-pass filters).</li>
<li><strong>Mục đích</strong>: Làm mờ ảnh (blurring) và <strong>giảm nhiễu</strong> (noise reduction).</li>
<li><strong>Đặc điểm</strong>: Làm giảm các chuyển tiếp đột ngột về mức xám, giúp ảnh mượt hơn nhưng cũng làm mất đi các chi tiết sắc nét.</li>
</ul>
</li>
<li>Bộ lọc làm nét (Sharpening Filters)
<ul>
<li><strong>Tên gọi khác</strong>: Bộ lọc thông cao (High-pass filters).</li>
<li><strong>Mục đích</strong>: Làm nổi bật các chi tiết nhỏ, <strong>tăng cường biên</strong> (edges) và làm rõ các chi tiết đã bị mờ.</li>
<li><strong>Đặc điểm</strong>: Làm tăng độ tương phản ở các vùng có sự thay đổi đột ngột về cường độ sáng (biên của đối tượng).</li>
</ul>
</li>
</ul>
</section>

<tr>
<td><strong>Ưu điểm</strong></td>
<td>Đơn giản, tính toán nhanh.</td>
<td>Làm mờ tự nhiên, kiểm soát được mức độ mờ qua <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.292ex" height="1ex" role="img" focusable="false" viewBox="0 -431 571 442"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D70E" d="M184 -11Q116 -11 74 34T31 147Q31 247 104 333T274 430Q275 431 414 431H552Q553 430 555 429T559 427T562 425T565 422T567 420T569 416T570 412T571 407T572 401Q572 357 507 357Q500 357 490 357T476 358H416L421 348Q439 310 439 263Q439 153 359 71T184 -11ZM361 278Q361 358 276 358Q152 358 115 184Q114 180 114 178Q106 141 106 117Q106 67 131 47T188 26Q242 26 287 73Q316 103 334 153T356 233T361 278Z"></path></g></g></g></svg></mjx-container>.</td>

</tr>
<tr>
<td><strong>Nhược điểm</strong></td>
<td>Làm mờ tất cả chi tiết, nhạy với nhiễu muối tiêu.</td>
<td>Vẫn làm mờ biên, tốn thời gian hơn.</td>

<h1 id="b%E1%BB%99-l%E1%BB%8Dc-l%C3%A0m-n%C3%A9t-sharpeninghighpass-filters">Bộ lọc làm nét (Sharpening/Highpass Filters)</h1>
<div class="columns">
  <div class="col-3">
<ul>
<li>
<p><strong>Mục đích</strong>: Làm nổi bật các cạnh và các chi tiết sắc nét trong ảnh.</p>

</ul>
</li>
</ul>
</div>
<div class="col-2">

</li>
</ul>
</div>
<ul>

<p>Làm nét ảnh bằng Laplacian trong OpenCV.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

<span class="hljs-comment"># Tính Laplacian</span>

<h1 id="b%C3%A0i-t%E1%BA%ADp-th%E1%BB%B1c-h%C3%A0nh">Bài tập thực hành</h1>
<p>Phát hiện biên với Sobel.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

img = cv2.imread(<span class="hljs-string">&#x27;input.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># Tính Sobel</span>
sobelx = cv2.Sobel(img, cv2.CV_64F, <span class="hljs-number">1</span>, <span class="hljs-number">0</span>, ksize=<span class="hljs-number">3</span>)
sobely = cv2.Sobel(img, cv2.CV_64F, <span class="hljs-number">0</span>, <span class="hljs-number">1</span>, ksize=<span class="hljs-number">3</span>)

<span class="hljs-comment"># Độ lớn gradient</span>
magnitude = np.sqrt(sobelx**<span class="hljs-number">2</span> + sobely**<span class="hljs-number">2</span>)
magnitude = np.clip(magnitude, <span class="hljs-number">0</span>, <span class="hljs-number">255</span>).astype(np.uint8)
</code></pre>
</section>

<h1 id="t%E1%BB%95ng-h%E1%BB%A3p-c%C3%A1c-b%E1%BB%99-l%E1%BB%8Dc-l%C3%A0m-n%C3%A9t">Tổng hợp các bộ lọc làm nét</h1>
<table>
<thead>
<tr>
<th>Bộ lọc</th>
<th>Nguyên lý</th>
<th>Ưu điểm</th>
<th>Nhược điểm</th>
<th>Ứng dụng</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Laplace</strong></td>
<td>Đạo hàm bậc hai, tính tổng biến thiên theo x và y.</td>
<td>Đẳng hướng; dùng một mặt nạ duy nhất; tính toán nhanh.</td>
<td>Rất nhạy với nhiễu; tạo biên kép; không cho biết hướng biên.</td>
<td>Làm nét nhanh; phát hiện biên zero-crossing.</td>
</tr>
<tr>
<td><strong>Gradient (Sobel)</strong></td>
<td>Đạo hàm bậc nhất theo hai hướng.</td>
<td>Cho cả độ lớn và hướng biên; chống nhiễu tốt hơn Laplace.</td>
<td>Làm nét trực tiếp kém hiệu quả; chậm hơn Laplace.</td>
<td>Phát hiện biên trong thị giác máy tính.</td>

<tr>
<td><strong>Unsharp Masking</strong></td>
<td>Ảnh gốc trừ ảnh đã làm mờ, cộng lại với hệ số k.</td>
<td>Kiểm soát mức độ làm nét; ít nhiễu hơn Laplace; tự nhiên.</td>
<td>Cần chọn bán kính làm mờ phù hợp; dễ tạo quầng sáng (halo).</td>
<td>Photoshop, in ấn, xuất bản.</td>
</tr>
<tr>
<td><strong>Highboost</strong></td>
<td>Mở rộng của USM, nhân thành phần tần số cao với hệ số A &gt; 1.</td>
<td>Làm nét mạnh; điều chỉnh từ tự nhiên đến siêu nét.</td>
<td>Dễ tạo quầng sáng/nhiễu nếu A quá lớn.</td>
<td>Ảnh viễn thám, thiên văn, y tế.</td>
</tr>

<h1 id="t%E1%BA%A1i-sao-c%E1%BA%A7n-x%E1%BB%AD-l%C3%BD-histogram">Tại sao cần xử lý Histogram</h1>
<ul>
<li><strong>Tăng cường ảnh</strong>: Giúp ảnh dễ nhìn hơn, làm nổi bật chi tiết ẩn trong các vùng bị tối hoặc quá sáng.</li>
<li><strong>Chuẩn hóa</strong>: Đưa các ảnh chụp trong điều kiện ánh sáng khác nhau về cùng một trạng thái để phục vụ cho các thuật toán thị giác máy tính phía sau (như nhận diện vật thể).</li>
<li><strong>Phân đoạn ảnh (Thresholding)</strong>: Histogram giúp xác định ngưỡng (threshold) tốt nhất để tách biệt đối tượng và nền (ví dụ: dùng phương pháp Otsu dựa trên Histogram).</li>
</ul>

<li><strong>Hạn chế</strong>:
<ul>
<li>Có thể làm nổi bật nhiễu nền.</li>
<li>Không phải lúc nào cũng tạo ra histogram phẳng hoàn hảo do làm tròn số nguyên.</li>
<li>Đôi khi làm mất chi tiết ở các vùng có tần suất xuất hiện cao.</li>
</ul>
</li>
</ul>
</div>

</div>

<h1 id="b%C3%A0i-t%E1%BA%ADp-th%E1%BB%B1c-h%C3%A0nh-1">Bài tập thực hành</h1>
<p>Cân bằng histogram với OpenCV.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

img = cv2.imread(<span class="hljs-string">&#x27;input.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># Cân bằng histogram</span>
eq_img = cv2.equalizeHist(img)

<span class="hljs-comment"># Vẽ histogram</span>
plt.figure(figsize=(<span class="hljs-number">10</span>, <span class="hljs-number">5</span>))
plt.subplot(<span class="hljs-number">121</span>), plt.hist(img.ravel(), <span class="hljs-number">256</span>, [<span class="hljs-number">0</span>, <span class="hljs-number">256</span>]), plt.title(<span class="hljs-string">&#x27;Histogram Gốc&#x27;</span>)
plt.subplot(<span class="hljs-number">122</span>), plt.hist(eq_img.ravel(), <span class="hljs-number">256</span>, [<span class="hljs-number">0</span>, <span class="hljs-number">256</span>]), plt.title(<span class="hljs-string">&#x27;Histogram Sau cân bằng&#x27;</span>)
plt.show()
</code></pre>
</section>

<h1 id="x%E1%BB%AD-l%C3%BD-histogram-c%E1%BB%A5c-b%E1%BB%99-local-histogram-processing">Xử lý Histogram cục bộ (Local Histogram Processing)</h1>
<ul>
<li><strong>Vấn đề</strong>: Cân bằng toàn cục (global) có thể làm hỏng chi tiết ở các vùng nhỏ hoặc làm sáng quá mức các vùng vốn đã sáng.</li>
</ul>
<div class="columns">
<div class="col-3">
<ul>
<li><strong>Giải pháp</strong>:

<li>Tính histogram cục bộ và áp dụng biến đổi cho pixel trung tâm.</li>

</li>

<div class="col-4">
<br />
<p><img src="images/2.15.png" alt="" style="width:600px;" /></p>
</div>

<ul>
<li><strong>Thống kê Histogram</strong>:
<ul>
<li>Sử dụng <strong>Mean (trung bình)</strong> và <strong>Variance (phương sai)</strong> cục bộ để phát hiện vùng tối/thấp tương phản.</li>
<li>Chỉ tăng cường những vùng đó (tránh khuếch đại nhiễu ở vùng sáng).</li>
</ul>
</li>
<li><strong>Lưu ý</strong>: Cách này tốn nhiều tài nguyên tính toán hơn so với cân bằng toàn cục.</li>
</ul>
</section>

<h1 id="bi%E1%BA%BFn-%C4%91%E1%BB%95i-trong-mi%E1%BB%81n-t%E1%BA%A7n-s%E1%BB%91">BIẾN ĐỔI TRONG MIỀN TẦN SỐ</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="45">
<h1 id="gi%E1%BB%9Bi-thi%E1%BB%87u">Giới thiệu</h1>
<ul>
<li>Ngoài việc xử lý trực tiếp trên các pixel (miền không gian), chúng ta có thể chuyển ảnh sang miền tần số để thực hiện các phép lọc phức tạp hơn.</li>
<li>Miền tần số cung cấp một cái nhìn khác về ảnh, dựa trên các thành phần tần số thay vì vị trí pixel.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="45">
<h1 id="bi%E1%BA%BFn-%C4%91%E1%BB%95i-fourier">Biến đổi Fourier</h1>
<ul>
<li><strong>Khái niệm</strong>: Mọi tín hiệu phức tạp, dù hỗn độn đến đâu, đều có thể được tạo ra bằng cách cộng các sóng hình sin (sine) và cosin (cosine) đơn giản, có tần số khác nhau, lại với nhau.</li>

<h1 id="%C3%BD-ngh%C4%A9a-c%E1%BB%A7a-ph%E1%BB%95-fourier-k%E1%BA%BFt-qu%E1%BA%A3-sau-bi%E1%BA%BFn-%C4%91%E1%BB%95i">Ý nghĩa của phổ Fourier (Kết quả sau biến đổi)</h1>
<ul>
<li>Khi thực hiện biến đổi Fourier trên một ảnh sẽ nhận được phổ Fourier, thường được biểu diễn dưới dạng một ảnh khác.</li>
</ul>
<div class="columns">
<div class="col-5">
<ul>
<li><strong>Tâm của ảnh phổ</strong>: Đại diện cho tần số thấp nhất (0) – tức là độ sáng trung bình của toàn bộ ảnh (thành phần DC). Điểm này thường rất sáng.</li>
<li><strong>Càng xa tâm</strong>: Đại diện cho tần số càng cao. Các điểm sáng ở xa tâm thể hiện các chi tiết sắc nét, các cạnh, đường biên hoặc nhiễu.</li>
<li><strong>Hai thành phần quan trọng</strong>:
<ul>
<li><strong>Phổ biên độ (Magnitude Spectrum)</strong>: Cho biết các tần số nào có mặt và &quot;mạnh&quot; đến mức nào.</li>
<li><strong>Phổ pha (Phase Spectrum)</strong>: Cho biết vị trí của các tần số đó trong ảnh. (Pha cực kỳ quan trọng, nếu mất pha sẽ không khôi phục được ảnh gốc).</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/2.16.png" alt="" /></p>
</div>
</div>
</section>

<h1 id="l%E1%BB%8Dc-ch%E1%BB%8Dn-l%E1%BB%8Dc-selective-filtering">Lọc chọn lọc (Selective Filtering)</h1>
<ul>
<li><strong>Mục đích</strong>: &quot;Nhắm mục tiêu&quot; vào các dải tần số cụ thể để xử lý các nhiễu phức tạp mà LPF/HPF thông thường không xử lý được.</li>
<li><strong>Bộ lọc chặn dải (Band-reject filter)</strong>: Loại bỏ một dải tần số nhất định.
<ul>
<li>Ứng dụng: Loại bỏ nhiễu định kỳ (như các đường sọc gây ra bởi nhiễu điện từ).</li>
</ul>
</li>
<li><strong>Bộ lọc thông dải (Band-pass filter)</strong>: Chỉ giữ lại một dải tần số nhất định.
<ul>
<li>Ứng dụng: Tách biệt các đối tượng có kích thước hoặc kết cấu cụ thể.</li>
</ul>
</li>
<li><strong>Bộ lọc Notch (Notch filter)</strong>: Chặn hoặc thông qua các tần số xung quanh một điểm cụ thể trong phổ Fourier.
<ul>
<li>Ứng dụng: Loại bỏ các nhiễu có tần số rất hẹp (như tần số 50Hz/60Hz từ ánh sáng đèn huỳnh quang).</li>
</ul>
</li>
</ul>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="45">
<h1 id="th%E1%BB%B1c-h%C3%A0nh---bi%E1%BA%BFn-%C4%91%E1%BB%95i-%E1%BA%A3nh-sang-mi%E1%BB%81n-ts-v%C3%A0-l%E1%BB%8Dc-th%C3%B4ng-th%E1%BA%A5p">Thực hành - Biến đổi ảnh sang miền TS và lọc thông thấp.</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> cv2
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

img = cv2.imread(<span class="hljs-string">&#x27;input.jpg&#x27;</span>, cv2.IMREAD_GRAYSCALE)

<span class="hljs-comment"># 1. Biến đổi Fourier</span>
f = np.fft.fft2(img)
fshift = np.fft.fftshift(f) <span class="hljs-comment"># Dịch tâm tần số 0 về giữa</span>

<span class="hljs-comment"># 2. Tạo mặt nạ lọc thông thấp Ideal (hoặc Gaussian)</span>
rows, cols = img.shape
crow, ccol = rows // <span class="hljs-number">2</span> , cols // <span class="hljs-number">2</span>
D0 = <span class="hljs-number">50</span> <span class="hljs-comment"># Bán kính ngưỡng</span>
mask = np.zeros((rows, cols), np.uint8)
<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(rows):
    <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(cols):
        D = np.sqrt((i - crow)**<span class="hljs-number">2</span> + (j - ccol)**<span class="hljs-number">2</span>)
        <span class="hljs-keyword">if</span> D &lt;= D0:

<span class="hljs-comment"># Áp dụng mặt nạ</span>

<h1 id="c%C3%A1c-b%C6%B0%E1%BB%9Bc-bi%E1%BA%BFn-%C4%91%E1%BB%95i-%E1%BA%A3nh-trong-mi%E1%BB%81n-t%E1%BA%A7n-s%E1%BB%91">Các bước biến đổi ảnh trong miền tần số</h1>
<ul>
<li><strong>Tóm tắt quy trình</strong>:
<ol>
<li><strong>Tiền xử lý</strong>: Đọc ảnh, chuyển đổi sang ảnh xám (grayscale) nếu cần, và thêm viền (padding) để tránh hiện tượng wrap-around (gập viền).</li>
<li><strong>Biến đổi thuận</strong>: Sử dụng FFT (Fast Fourier Transform) để chuyển ảnh từ miền không gian sang miền tần số.</li>
<li><strong>Dịch tâm (Centering)</strong>: Sử dụng hàm dịch để đưa thành phần tần số 0 (DC component) về trung tâm của phổ.</li>
<li><strong>Lọc (Filtering)</strong>: Tạo mặt nạ lọc (Filter Mask) và nhân phổ tần số với mặt nạ này (theo định lý tích chập).</li>
<li><strong>Dịch ngược</strong>: Đưa tâm phổ về lại vị trí ban đầu (góc trên bên trái).</li>
<li><strong>Biến đổi ngược</strong>: Sử dụng IFFT (Inverse Fast Fourier Transform) để chuyển ảnh từ miền tần số về lại miền không gian.</li>
